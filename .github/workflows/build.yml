name: Build

on:
  push:
    tags: ["v*"]

permissions:
  contents: write
  packages: write

jobs:
  build:
    name: Build (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-amd64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            name: linux-arm64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: macos-amd64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: macos-arm64
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
      - name: Cache pip packages
        if: runner.os == 'Linux'
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-zigbuild-${{ runner.os }}
      - name: Install cargo-zigbuild and zig
        if: runner.os == 'Linux'
        run: pip3 install cargo-zigbuild ziglang
      - name: Build (zigbuild)
        if: runner.os == 'Linux'
        run: cargo zigbuild --release --target ${{ matrix.target }} -p cclog-cli
      - name: Build (native)
        if: runner.os != 'Linux'
        run: cargo build --release --target ${{ matrix.target }} -p cclog-cli
      - name: Rename binary
        run: cp target/${{ matrix.target }}/release/cclog cclog-${{ matrix.name }}
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: cclog-${{ matrix.name }}
          path: cclog-${{ matrix.name }}

  publish:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Publish cclog (lib)
        run: cargo publish -p cclog --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}
      - name: Wait for crates.io index update
        run: sleep 30
      - name: Publish cclog-cli
        run: cargo publish -p cclog-cli --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_TOKEN }}

  docker:
    name: Docker
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download linux-amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: cclog-linux-amd64
          path: docker-context/amd64
      - name: Download linux-arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: cclog-linux-arm64
          path: docker-context/arm64
      - name: Prepare binaries
        run: |
          mv docker-context/amd64/cclog-linux-amd64 docker-context/amd64/cclog
          mv docker-context/arm64/cclog-linux-arm64 docker-context/arm64/cclog
          chmod +x docker-context/*/cclog
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=latest
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
      - name: Build and push multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: docker-context
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  upload:
    name: Upload binaries to release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          pattern: cclog-*
      - name: Upload binaries to release
        run: |
          gh release upload "${{ github.ref_name }}" \
            artifacts/cclog-linux-amd64/cclog-linux-amd64 \
            artifacts/cclog-linux-arm64/cclog-linux-arm64 \
            artifacts/cclog-macos-amd64/cclog-macos-amd64 \
            artifacts/cclog-macos-arm64/cclog-macos-arm64 \
            --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_REPO: ${{ github.repository }}
